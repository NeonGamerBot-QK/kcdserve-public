services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "bundle install && bin/rails db:prepare && bin/rails tailwindcss:build && bin/rails server -b 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
    environment:
      - RAILS_ENV=development
      - POSTGRES_HOST=db
      - RAILS_MASTER_KEY=deadbeefcafebabedeadbeefcafebabe
      - SECRET_KEY_BASE=deadbeefcafebabedeadbeefcafebabedeadbeefcafebabedeadbeefcafebabe
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:17-alpine
    container_name: kcdserve_postgres
    environment:
      POSTGRES_USER: kcdserve
      POSTGRES_PASSWORD: kcdserve
      POSTGRES_DB: kcdserve_development
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kcdserve -d kcdserve_development"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  bundle:
