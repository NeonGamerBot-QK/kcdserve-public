services:
  db:
    image: postgres:17-alpine
    container_name: kcdserve_postgres
    environment:
      POSTGRES_USER: kcdserve
      POSTGRES_PASSWORD: kcdserve
      POSTGRES_DB: kcdserve_development
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kcdserve"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
